<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a0a2e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#b794ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#7c5cff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#halo)"/>

  <!-- Logo top -->
  <text x="80" y="100" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="900" fill="#fafafa" letter-spacing="8">PRIVÉ<tspan fill="#b794ff">ZONE</tspan></text>
  <line x1="80" y1="125" x2="200" y2="125" stroke="#b794ff" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="80" y="240" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#b794ff" letter-spacing="6">CYBERSÉCURITÉ · VIE PRIVÉE · 2026</text>

  <!-- Big title -->
  <text x="80" y="370" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="900" fill="#fafafa" letter-spacing="-4">PRIVÉ.</text>
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="900" fill="url(#glow)" letter-spacing="-4">ANONYME.</text>

  <!-- Bottom tagline -->
  <text x="80" y="570" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#7a7a7a">Guides cyber sans bullshit · Mullvad · Bitwarden · Tor · VeraCrypt</text>
</svg>
